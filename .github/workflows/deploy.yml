name: Deploy to Azure

# Builds the container image, pushes it to Azure Container Registry, and points
# the App Service Web App at the new image. Auth to Azure uses GitHub OIDC
# (federated credentials) — no long-lived secrets stored in the repo.
#
# Required repo configuration (Settings -> Secrets and variables -> Actions):
#   Secrets:   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   Variables: ACR_NAME, AZURE_RESOURCE_GROUP, AZURE_WEBAPP_NAME
# See deploy/github-oidc-setup.sh to create the identity + federated credential.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "deploy/**"
      - ".github/workflows/copilot-setup-steps.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: mymusicapp

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Compute image reference
        id: meta
        run: |
          echo "registry=${{ vars.ACR_NAME }}.azurecr.io" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push image to ACR
        run: |
          REGISTRY="${{ steps.meta.outputs.registry }}"
          TAG="${{ steps.meta.outputs.tag }}"
          # Federated (OIDC) logins have no AAD refresh token, so `az acr login`
          # fails with CONNECTIVITY_REFRESH_TOKEN_ERROR. Exchange the ARM access
          # token for an ACR refresh token directly, then docker login with it.
          AAD_TOKEN="$(az account get-access-token --query accessToken -o tsv)"
          TENANT="$(az account show --query tenantId -o tsv)"
          ACR_TOKEN="$(curl -fsS -X POST "https://$REGISTRY/oauth2/exchange" \
            -H 'Content-Type: application/x-www-form-urlencoded' \
            -d "grant_type=access_token&service=$REGISTRY&tenant=$TENANT&access_token=$AAD_TOKEN" \
            | jq -r '.refresh_token')"
          echo "$ACR_TOKEN" | docker login "$REGISTRY" \
            --username 00000000-0000-0000-0000-000000000000 --password-stdin
          docker build \
            -t "$REGISTRY/$IMAGE_NAME:$TAG" \
            -t "$REGISTRY/$IMAGE_NAME:latest" .
          docker push "$REGISTRY/$IMAGE_NAME:$TAG"
          docker push "$REGISTRY/$IMAGE_NAME:latest"

      - name: Point Web App at the new image
        run: |
          REGISTRY="${{ steps.meta.outputs.registry }}"
          TAG="${{ steps.meta.outputs.tag }}"
          az webapp config container set \
            --name "${{ vars.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --container-image-name "$REGISTRY/$IMAGE_NAME:$TAG"
          az webapp restart \
            --name "${{ vars.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}"
